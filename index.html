<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจสอบสถานะเรื่องร้องเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; }
    .header-bar { background: #001e3c; color: white; padding: 25px 15px; border-bottom: 5px solid #c5a028; text-align: center; }
    .search-card { max-width: 600px; margin: 35px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; }
    .result-card { max-width: 740px; margin: 0 auto 40px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none; }
    .status-text { color: #c5a028; font-weight: bold; }
  </style>
</head>
<body>

<div class="header-bar">
  <h3>ระบบตรวจสอบสถานะเรื่องร้องเรียน</h3>
  <p>คณะกรรมาธิการการป้องกันและปราบปรามการทุจริตประพฤติมิชอบ</p>
</div>

<div class="container mt-4">
  <div class="search-card text-center">
    <div class="input-group">
      <input type="text" id="recNo" class="form-control" placeholder="กรอกเลขรับเรื่อง...">
      <button class="btn btn-primary" onclick="doSearch()">ค้นหา</button>
    </div>
  </div>

  <div id="result-card" class="result-card">
    <div class="result-header p-3 border-bottom font-weight-bold">ข้อมูลเรื่องพิจารณา</div>
    <div class="result-body p-4" id="result-content"></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz8Qrp5SRCJ6uvnD29Imdvt5cVJv1BU1xxiYCg6Xib0IaGteYNkAK8mxPiPu_GYXFKNYw/exec";

  async function doSearch() {
    const recNo = document.getElementById('recNo').value.trim();
    const response = await fetch(`${API_URL}?action=search&recNo=${encodeURIComponent(recNo)}`);
    const res = await response.json();
    
    if (res.found) {
      renderResult(res.data);
    } else {
      alert(res.msg);
    }
  }

  function renderResult(data) {
    document.getElementById('result-card').style.display = 'block';
    
    // ดึงค่าการประชุมมาแสดงผล
    let meetingRows = '';
    if (data.meetings && Array.isArray(data.meetings)) {
      data.meetings.forEach(m => {
        meetingRows += `<tr><td>${m.round || '-'}</td><td>${m.date || '-'}</td></tr>`;
      });
    }

    document.getElementById('result-content').innerHTML = `
      <table class="table table-bordered">
        <tr><th>เลขรับเรื่อง</th><td>${data.recNo || '-'}</td></tr>
        <tr><th>เรื่อง</th><td>${data.caseTitle || '-'}</td></tr>
        <tr><th>สถานะ</th><td class="status-text">${data.status || '-'}</td></tr>
      </table>
      <h6 class="mt-4">ข้อมูลการประชุม</h6>
      <table class="table table-sm border">
        <thead><tr><th>ครั้งที่</th><th>วันที่ประชุม</th></tr></thead>
        <tbody>${meetingRows || '<tr><td colspan="2">ไม่มีข้อมูลการประชุม</td></tr>'}</tbody>
      </table>
    `;
  }
</script>
</body>
</html>
