<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสืบค้นสถานะเรื่องพิจารณา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; }
    .search-card { max-width: 600px; margin: 35px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; }
    .result-card { max-width: 740px; margin: 0 auto 40px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none; }
    .result-header { background: #f8f9fa; padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: bold; color: #001e3c; }
    .result-body { padding: 25px; }
  </style>
</head>
<body>

<div class="container">
  <div class="search-card text-center">
    <h5>ค้นหาด้วยเลขรับเรื่อง</h5>
    <div class="input-group">
      <input type="text" id="recNo" class="form-control" placeholder="กรอกเลขรับเรื่อง...">
      <button class="btn btn-primary" id="btn-search" onclick="doSearch()">ค้นหาข้อมูล</button>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">ข้อมูลเรื่องพิจารณา</div>
    <div class="result-body" id="result-content"></div>
  </div>
</div>

<script>
  // ** เปลี่ยน URL ตรงนี้เป็น URL ที่ได้จาก Google Apps Script (ลงท้ายด้วย /exec) **
  const API_URL = "https://script.google.com/macros/s/AKfycby1F75l7QxuJJXixSXuyFLZHQKvvA1WE49cM_TUztA4P4rQ_mcSJZrnOesbodFCzEusHw/exec";

  async function doSearch() {
    const recNo = document.getElementById('recNo').value.trim();
    if (!recNo) return;

    const btn = document.getElementById('btn-search');
    btn.innerHTML = 'กำลังค้นหา...';
    btn.disabled = true;

    try {
      const response = await fetch(`${API_URL}?action=search&recNo=${encodeURIComponent(recNo)}`);
      const res = await response.json();
      
      btn.innerHTML = 'ค้นหาข้อมูล';
      btn.disabled = false;

      // ปรับจูนให้ดึงข้อมูลจาก res.data.case หรือ res.data ได้ตามโครงสร้างจริง
      if (res && res.found) {
        const data = (res.data && res.data.case) ? res.data.case : res.data;
        renderResult(data);
      } else {
        Swal.fire('ไม่พบข้อมูล', res.msg || 'ไม่พบเลขรับเรื่องนี้', 'error');
      }
    } catch (err) {
      btn.innerHTML = 'ค้นหาข้อมูล';
      btn.disabled = false;
      Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อ API ได้', 'error');
    }
  }

  function renderResult(data) {
    document.getElementById('result-card').style.display = 'block';
    // แสดงผลข้อมูลลงในตาราง (สามารถปรับแต่ง HTML ตรงนี้ได้ตามต้องการ)
    let html = `
      <table class="table table-bordered">
        <tr><th>เลขรับเรื่อง</th><td>${data.recNo || '-'}</td></tr>
        <tr><th>เรื่อง</th><td>${data.caseTitle || data.title || '-'}</td></tr>
        <tr><th>สถานะ</th><td>${data.displayStatus || data.status || '-'}</td></tr>
      </table>
    `;
    document.getElementById('result-content').innerHTML = html;
  }
</script>

</body>
</html>
